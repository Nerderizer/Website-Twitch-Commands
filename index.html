<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserID10T Bot Commands</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card-bg: #1f1f23;
            --accent: #9147ff; /* Twitch Purple */
            --text: #efeff1;
            --text-muted: #adadb8;
            --border: #303032;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
        }

        h1 { font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        p { color: var(--text-muted); }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        #searchBar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        #searchBar:focus { border-color: var(--accent); }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .group-section { margin-bottom: 30px; }
        .group-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .command-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .command-card:hover { transform: translateY(-3px); border-color: var(--accent); }

        .trigger {
            font-family: monospace;
            font-weight: 600;
            color: var(--accent);
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        .description { font-size: 0.95rem; line-height: 1.4; margin-bottom: 10px; }

        .badge {
            font-size: 0.75rem;
            background: #3a3a3d;
            padding: 3px 8px;
            border-radius: 4px;
            color: #d3d3d3;
        }

        .no-results { text-align: center; color: var(--text-muted); display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>UserID10T Arcade Commands</h1>
        <p>A full list of interactive and fun commands available in chat!</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search commands (e.g. slap, rpg, hug)..." onkeyup="filterCommands()">
    </div>

    <div class="container" id="commandList">
        <!-- Content loaded via JS -->
    </div>

    <div id="noResults" class="no-results">
        No commands match your search.
    </div>

    <script>
        let allData = [];

        async function loadCommands() {
            try {
                // Fetch the JSON generated by Streamer.bot
                const response = await fetch('commands.json');
                allData = await response.json();
                renderCommands(allData);
            } catch (err) {
                console.error("Error loading JSON:", err);
                document.getElementById('commandList').innerHTML = "Failed to load commands. Make sure commands.json exists.";
            }
        }

        function renderCommands(data) {
            const container = document.getElementById('commandList');
            container.innerHTML = '';

            // Group data by 'Group'
            const grouped = data.reduce((acc, obj) => {
                const key = obj.Group;
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});

            for (const group in grouped) {
                const section = document.createElement('div');
                section.className = 'group-section';
                
                section.innerHTML = `
                    <div class="group-title">${group}</div>
                    <div class="commands-grid">
                        ${grouped[group].map(cmd => `
                            <div class="command-card">
                                <span class="trigger">${cmd.Trigger}</span>
                                <div class="description">${cmd.Description}</div>
                                <span class="badge">${cmd.Permissions}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        function filterCommands() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allData.filter(cmd => 
                cmd.Trigger.toLowerCase().includes(term) || 
                cmd.Description.toLowerCase().includes(term) ||
                cmd.Group.toLowerCase().includes(term)
            );
            
            renderCommands(filtered);
            document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
        }

        loadCommands();
    </script>
</body>
</html>
