<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserID10T Arcade - Command List</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0e0e10;
            color: #efeff1;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #303032; margin-bottom: 20px; }
        h1 { color: #9147ff; margin: 0; }
        
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; background: #1f1f23; border: 1px solid #303032; color: white; border-radius: 5px; font-size: 16px; box-sizing: border-box; }

        table { width: 100%; border-collapse: collapse; background: #18181b; border-radius: 8px; overflow: hidden; margin-bottom: 40px; }
        th { background-color: #9147ff; color: white; text-align: left; padding: 12px; font-size: 14px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #303032; font-size: 15px; vertical-align: top; }
        
        .group-header { background: #26262c; color: #adadb8; font-weight: bold; padding: 10px 12px; font-size: 13px; letter-spacing: 1px; }
        .trigger-cell { color: #bf94ff; font-family: 'Courier New', Courier, monospace; font-weight: bold; white-space: nowrap; }
        .perm-badge { font-size: 11px; background: #3a3a3d; padding: 2px 6px; border-radius: 4px; color: #adadb8; }
        
        tr:hover { background-color: #1f1f23; }
        @media (max-width: 600px) {
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>UserID10T Arcade</h1>
        <p>Interactive Twitch & YouTube Bot Commands</p>
    </div>

    <input type="text" id="searchBar" class="search-box" placeholder="Search for a command..." onkeyup="filterTable()">

    <table id="commandTable">
        <thead>
            <tr>
                <th width="30%">Command</th>
                <th width="50%">Description</th>
                <th width="20%" class="hide-mobile">Access</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be injected here -->
        </tbody>
    </table>
</div>

<script>
    let commandData = [];

    async function fetchCommands() {
        try {
            // Added cache buster to ensure you see updates immediately
            const response = await fetch('commands.json?v=' + new Date().getTime());
            commandData = await response.json();
            renderTable(commandData);
        } catch (error) {
            console.error("Error loading JSON:", error);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="3">Failed to load commands.json</td></tr>';
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        // Group by 'Group' field
        const grouped = data.reduce((acc, obj) => {
            const key = obj.Group || 'General';
            if (!acc[key]) acc[key] = [];
            acc[key].push(obj);
            return acc;
        }, {});

        for (const group in grouped) {
            // Add Category Header Row
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = `<td colspan="3" class="group-header">${group}</td>`;
            tbody.appendChild(headerRow);

            // Add Command Rows
            grouped[group].forEach(cmd => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="trigger-cell">${cmd.Trigger}</td>
                    <td>
                        <div>${cmd.Description}</div>
                    </td>
                    <td class="hide-mobile">
                        <span class="perm-badge">${cmd.Permissions}</span>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
    }

    function filterTable() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        const filtered = commandData.filter(cmd => 
            cmd.Trigger.toLowerCase().includes(input) || 
            cmd.Description.toLowerCase().includes(input) ||
            cmd.Group.toLowerCase().includes(input)
        );
        renderTable(filtered);
    }

    fetchCommands();
</script>

</body>
</html>
